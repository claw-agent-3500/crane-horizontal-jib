# Counterjib Analysis Example

crane:
  name: TC7030-12 Counterjib
  jib_length: 15.0  # Counterjib length
  jib_height_position: 0.0

sections:
  - name: Root
    start: 0.0
    end: 5.0
    weight_per_length: 2.0
    area: 0.04
    moment_of_inertia: 0.012
    height: 1.5
    yield_strength: 345.0

  - name: Mid
    start: 5.0
    end: 10.0
    weight_per_length: 1.8
    area: 0.035
    moment_of_inertia: 0.010
    height: 1.4
    yield_strength: 345.0

  - name: Tip
    start: 10.0
    end: 15.0
    weight_per_length: 1.5
    area: 0.03
    moment_of_inertia: 0.008
    height: 1.3
    yield_strength: 345.0

# Static loads on counterjib (counterweights)
point_loads:
  - name: counterweight
    position: 12.0  # Near tip
    magnitude: 200.0  # kN

  - name: counterweight_2
    position: 8.0
    magnitude: 150.0  # kN

  - name: ballast
    position: 14.0  # At tip
    magnitude: 100.0  # kN additional ballast

# Load cases
load_cases:
  - name: Counterweight
    coefficients:
      self_weight: 1.0
      counterweight: 1.0
      counterweight_2: 1.0
      ballast: 1.0

analysis:
  serviceability_limit: "L/250"