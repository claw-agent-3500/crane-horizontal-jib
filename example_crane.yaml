# Tower Crane Jib Calculator - Example Input
# Flat top tower crane jib modeled as cantilever with varying cross-sections
# Coordinate system: X=longitudinal, Y=height (positive up), Z=width

crane:
  name: "TC7030-12 Example"
  jib_length: 60.0             # Total jib length (m)
  youngs_modulus: 200000000.0  # kN/m² (200 GPa steel)

sections:
  - name: "Root Section (Heavy Truss)"
    start: 0.0
    end: 12.0
    weight_per_length: 2.8
    area: 0.085
    moment_of_inertia: 0.042
    height: 2.6

  - name: "Mid-Root Section"
    start: 12.0
    end: 24.0
    weight_per_length: 2.2
    area: 0.068
    moment_of_inertia: 0.031
    height: 2.2

  - name: "Mid Section"
    start: 24.0
    end: 40.0
    weight_per_length: 1.6
    area: 0.048
    moment_of_inertia: 0.018
    height: 1.8

  - name: "Tip Section (Light Truss)"
    start: 40.0
    end: 55.0
    weight_per_length: 1.0
    area: 0.032
    moment_of_inertia: 0.009
    height: 1.4

  - name: "Tip Assembly"
    start: 55.0
    end: 60.0
    weight_per_length: 0.8
    area: 0.025
    moment_of_inertia: 0.005
    height: 1.2

# Point loads (max 5)
point_loads:
  - name: "Tip Sheave + Hoist"
    position: 60.0
    magnitude: 15.0

  - name: "Counterweight Connection"
    position: 0.5
    magnitude: 8.0

# UDLs (max 5) — additional distributed loads beyond section self-weights
udls: []

# Trolley sweep — finds worst-case trolley position
trolley_sweep:
  enabled: true
  magnitude: 128.0    # kN (trolley + max payload)
  min_position: 3.0
  max_position: 58.0
  step: 1.0

# Analysis settings
analysis:
  num_points: 500
  units:
    force: "kN"
    moment: "kN·m"
    stress: "MPa"
    length: "m"
    deflection: "mm"
  coordinate_system:
    x: "longitudinal (along jib, root at 0)"
    y: "vertical (positive up, gravity in -Y)"
    z: "width (perpendicular to bending plane)"
