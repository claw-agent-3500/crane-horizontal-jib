# Tower Crane Jib Calculator - Example Input
# Flat top tower crane jib modeled as cantilever with varying cross-sections
# Coordinate system: X=longitudinal, Y=height (positive up), Z=width

crane:
  name: "TC7030-12 Example"
  jib_length: 60.0           # Total jib length in meters

sections:
  # Cross-sections along the jib (X axis)
  # Must cover [0, jib_length] without gaps
  - name: "Root Section (Heavy Truss)"
    start: 0.0
    end: 12.0
    weight_per_length: 2.8    # kN/m (self-weight, acts in -Y)
    area: 0.085               # m² (effective cross-section area)
    moment_of_inertia: 0.042  # m⁴ (I about Z axis, bending in X-Y plane)
    height: 2.6               # m (Y dimension, depth)

  - name: "Mid-Root Section"
    start: 12.0
    end: 24.0
    weight_per_length: 2.2
    area: 0.068
    moment_of_inertia: 0.031
    height: 2.2

  - name: "Mid Section"
    start: 24.0
    end: 40.0
    weight_per_length: 1.6
    area: 0.048
    moment_of_inertia: 0.018
    height: 1.8

  - name: "Tip Section (Light Truss)"
    start: 40.0
    end: 55.0
    weight_per_length: 1.0
    area: 0.032
    moment_of_inertia: 0.009
    height: 1.4

  - name: "Tip Assembly"
    start: 55.0
    end: 60.0
    weight_per_length: 0.8
    area: 0.025
    moment_of_inertia: 0.005
    height: 1.2

# Point loads (max 5)
# All loads act in -Y direction (downward)
point_loads:
  - name: "Tip Sheave + Hoist"
    position: 60.0    # X position (m from root)
    magnitude: 15.0   # kN (downward, -Y)

  - name: "Counterweight Connection"
    position: 0.5
    magnitude: 8.0

# UDLs (max 5) — includes self-weight from sections + any additional distributed loads
# Self-weight is automatically computed from sections.
# Use this for additional distributed loads (wind, ice, etc.)
udls: []

# Analysis settings
analysis:
  num_points: 500       # Number of points along jib for diagrams
  units:
    force: "kN"
    moment: "kN·m"
    stress: "MPa"
    length: "m"
  coordinate_system:
    x: "longitudinal (along jib, root at 0)"
    y: "vertical (positive up, gravity in -Y)"
    z: "width (perpendicular to bending plane)"
